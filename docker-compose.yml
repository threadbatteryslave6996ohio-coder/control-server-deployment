services:
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.external-url=/prometheus/"
      - "--web.route-prefix=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/targets:/etc/prometheus/targets:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki
    container_name: loki
    command:
      - "-config.file=/etc/loki/config.yaml"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: grafana
    profiles:
      - grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped

  splunk:
    image: splunk/splunk:latest
    container_name: splunk
    environment:
      SPLUNK_GENERAL_TERMS: ${SPLUNK_GENERAL_TERMS:---accept-sgt-current-at-splunk-com}
      SPLUNK_START_ARGS: --accept-license
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD:?set SPLUNK_PASSWORD in .env}
      SPLUNK_HEC_TOKEN: ${SPLUNK_HEC_TOKEN:?set SPLUNK_HEC_TOKEN in .env}
      SPLUNK_HEC_PORT: ${SPLUNK_HEC_PORT:-8088}
      SPLUNK_HEC_SSL: "False"
    # No published ports: HEC and the web UI are reached through the proxy on
    # the single ingress port. See README, "Single ingress".
    volumes:
      - ./splunk/default.yml:/tmp/defaults/default.yml:ro
      - splunk-data:/opt/splunk/var
    restart: unless-stopped

  proxy:
    image: nginx:alpine
    container_name: control-server-proxy
    depends_on:
      - prometheus
      - loki
      - splunk
    ports:
      - "${PROXY_BIND_ADDRESS:-0.0.0.0}:${PROXY_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  prometheus-data:
  loki-data:
  grafana-data:
  splunk-data:
