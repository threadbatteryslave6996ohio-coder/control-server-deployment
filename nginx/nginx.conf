worker_processes auto;

events {
  worker_connections 1024;
}

http {
  resolver 127.0.0.11 ipv6=off valid=10s;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  map $uri $service_name {
    default unknown;
    ~^/prometheus(?:/|$) prometheus;
    ~^/loki(?:/|$) loki;
    ~^/grafana(?:/|$) grafana;
  }

  log_format access_json escape=json
    '{"time":"$time_iso8601",'
    '"client":"$remote_addr",'
    '"service":"$service_name",'
    '"method":"$request_method",'
    '"path":"$uri",'
    '"status":$status,'
    '"bytes":$body_bytes_sent,'
    '"request_seconds":$request_time,'
    '"upstream_seconds":"$upstream_response_time",'
    '"user_agent":"$http_user_agent"}';

  access_log /dev/stdout access_json;
  error_log /dev/stderr warn;

  server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 0;

    location = /health {
      access_log off;
      return 204;
    }

    location = / {
      default_type text/plain;
      return 200 "Available services:\n/prometheus/\n/loki/\n/grafana/\n";
    }

    location = /prometheus {
      return 308 /prometheus/;
    }

    location /prometheus/ {
      proxy_pass http://prometheus:9090;
      proxy_http_version 1.1;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /prometheus;
    }

    location = /loki {
      return 308 /loki/;
    }

    location = /loki/ready {
      proxy_pass http://loki:3100/ready;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /loki/metrics {
      proxy_pass http://loki:3100/metrics;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /loki/ {
      proxy_pass http://loki:3100;
      proxy_http_version 1.1;
      proxy_request_buffering off;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /loki;
    }

    location = /grafana {
      return 308 /grafana/;
    }

    location /grafana/ {
      set $grafana_upstream grafana:3000;
      proxy_pass http://$grafana_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /grafana;
    }
  }
}
